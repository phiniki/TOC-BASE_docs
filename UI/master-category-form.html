  <main class="app-main page-scroll page-stack">
    <div class="page-header">
      <div>
        <h1 class="page-header__title">カテゴリの登録・編集</h1>
      </div>
      <div class="page-header__actions">
        <a href="master-categories.html" class="btn btn--ghost btn--sm">一覧に戻る</a>
      </div>
    </div>

    <div class="form-sheet-wrap">
      <form class="form-sheet" action="#" onsubmit="return false;">
        <div class="form-sheet__head">
          <h2>カテゴリ定義</h2>
        </div>
        <div class="form-sheet__body">
          <div class="form-section">
            <h3 class="form-section__title">属性</h3>
            <div class="form-grid">
              <div class="form-field">
                <label for="csort">表示順</label>
                <input id="csort" name="sort" type="number" value="80" />
              </div>
              <div class="form-field">
                <label for="ccode">コード</label>
                <input id="ccode" name="code" type="text" placeholder="CAT-08" />
              </div>
              <div class="form-field">
                <label for="cname">カテゴリ名<span class="req">*</span></label>
                <input id="cname" name="name" type="text" />
              </div>
              <div class="form-field">
                <label for="cst">状態</label>
                <select id="cst" name="status">
                  <option>有効</option>
                  <option>無効</option>
                </select>
              </div>
              <div class="form-field">
                <label for="ccolor">表示色（ダッシュボード用）</label>
                <input id="ccolor" name="color" type="color" value="#3b82f6" />
              </div>
              <div class="form-field form-field--full">
                <label for="cdesc">説明（摘要）</label>
                <textarea id="cdesc" name="description"></textarea>
              </div>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn--primary" id="btnSaveMasterCategory">保存</button>
            <a href="master-categories.html" class="btn btn--ghost">キャンセル</a>
          </div>
        </div>
      </form>
    </div>
  </main>
</div>
