  <main class="app-main page-scroll page-stack">
  <div class="page-header">
    <div>
      <h1 class="page-header__title" id="mediaFormPageTitle">媒体追加</h1>
    </div>
    <div class="page-header__actions">
      <a href="media-mgmt.html" class="btn btn--ghost btn--sm">一覧へ戻る</a>
    </div>
  </div>

  <div class="form-sheet-wrap">
    <form class="form-sheet" id="mediaEditForm" action="#" method="post" onsubmit="return false;">
      <input type="hidden" id="media_edit_id" name="media_id" value="" />
      <input type="hidden" id="media_contract_status" value="新規" />
      <input type="hidden" id="media_sponsor_prev_contract_date" value="" />
      <input type="hidden" id="media_landlord_prev_contract_date" value="" />
      <div class="form-sheet__head">
        <h2>媒体データ</h2>
      </div>
      <div class="form-sheet__body">
      <div class="form-section">
      <div class="form-grid media-edit-grid">
        <div class="form-field form-field--full media-edit-section-title">案件情報</div>
        <div class="form-field form-field--full">
          <label for="m_caseId">案件（区分: 媒体）</label>
          <select id="m_caseId" name="case_id"></select>
        </div>
        <div class="form-field">
          <label for="m_caseEstimateNo">見積No.（案件連動）</label>
          <input id="m_caseEstimateNo" type="text" readonly />
        </div>
        <div class="form-field">
          <label for="m_caseSponsor">スポンサー/取引先（案件連動）</label>
          <input id="m_caseSponsor" type="text" readonly />
        </div>
        <div class="form-field form-field--full"><label for="m_designFace">意匠面</label><input id="m_designFace" type="text" /></div>
        <div class="form-field"><label for="m_size">サイズ</label><input id="m_size" type="text" /></div>
        <div class="form-field">
          <label for="m_mediaFeeEx">媒体料（税別）</label>
          <input id="m_mediaFeeEx" type="text" inputmode="numeric" />
          <label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px">
            <input id="m_mediaFeeIncludeFirstInvoice" type="checkbox" checked />
            初回請求に初回契約年数分を含む
          </label>
        </div>
        <div class="form-field">
          <label for="m_landlordRentEx">地主への支払賃料（税別）</label>
          <input id="m_landlordRentEx" type="text" inputmode="numeric" />
          <label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px">
            <input id="m_landlordRentIncludeFirstInvoice" type="checkbox" checked />
            初回請求に含む
          </label>
        </div>
        <div class="form-field"><label for="m_removalCostEx">撤去費（税別）</label><input id="m_removalCostEx" type="text" inputmode="numeric" /></div>

        <div class="form-field form-field--full media-edit-section-title">物件情報</div>
        <div class="form-field form-field--full"><label for="m_propertyLocation">物件所在地</label><input id="m_propertyLocation" type="text" /></div>
        <div class="form-field"><label for="m_outdoorAdApplied">屋外広告申請済み</label><input id="m_outdoorAdApplied" type="checkbox" /></div>
        <div class="form-field"><label for="m_outdoorAdCompany">屋外広告申請会社</label><input id="m_outdoorAdCompany" type="text" /></div>
        <div class="form-field form-field--full"><label for="m_cancellationRecruitable">解約時募集可能</label><select id="m_cancellationRecruitable"><option>◯</option><option>×</option><option selected>要協議</option></select></div>

        <div class="form-field form-field--full media-edit-section-title">スポンサー契約</div>
        <div class="form-field"><label for="m_sponsorContractCompany">スポンサー契約会社</label><select id="m_sponsorContractCompany"><option>TOC</option><option>アドディレクション</option></select></div>
        <div class="form-field"><label for="m_sponsorTel">スポンサーTEL</label><input id="m_sponsorTel" type="text" /></div>
        <div class="form-field"><label for="m_sponsorFirstContractDate">スポンサー初回契約日</label><input id="m_sponsorFirstContractDate" type="date" /></div>
        <div class="form-field"><label for="m_sponsorFirstContractYears">スポンサー初回契約年数</label><select id="m_sponsorFirstContractYears"><option value="0.5">6ヶ月</option><option value="1">1年</option><option value="2" selected>2年</option><option value="3">3年</option></select></div>
        <div class="form-field"><label for="m_sponsorRenewalWindowDays">スポンサー継続確認期間</label><select id="m_sponsorRenewalWindowDays"><option value="1">1ヶ月</option><option value="2" selected>2ヶ月</option><option value="3">3ヶ月</option></select></div>
        <div class="form-field"><label for="m_sponsorLeadTimeDays">スポンサー契約確認リードタイム</label><select id="m_sponsorLeadTimeDays"><option value="0">0ヶ月</option><option value="1" selected>1ヶ月</option><option value="2">2ヶ月</option><option value="3">3ヶ月</option></select></div>
        <div class="form-field"><label>スポンサー継続確認期日（自動計算）</label><div id="m_sponsorRenewalDueDatePreview" class="form-readonly media-calc-readonly">—</div></div>
        <div class="form-field"><label>スポンサー継続確認日（自動計算）</label><div id="m_sponsorRenewalCheckDatePreview" class="form-readonly media-calc-readonly">—</div></div>

        <div class="form-field form-field--full media-edit-section-title">地主契約</div>
        <div class="form-field"><label for="m_landlordContractCompany">地主契約会社</label><select id="m_landlordContractCompany"><option>TOC</option><option>アドディレクション</option></select></div>
        <div class="form-field"><label for="m_landlordName">地主名</label><input id="m_landlordName" type="text" /></div>
        <div class="form-field"><label for="m_landlordTel">地主TEL</label><input id="m_landlordTel" type="text" /></div>
        <div class="form-field form-field--full"><label for="m_landlordAddress">地主住所</label><input id="m_landlordAddress" type="text" /></div>
        <div class="form-field"><label for="m_landlordFirstContractDate">地主初回契約日</label><input id="m_landlordFirstContractDate" type="date" /></div>
        <div class="form-field"><label for="m_landlordFirstContractYears">地主初回契約年数</label><select id="m_landlordFirstContractYears"><option value="0.5">6ヶ月</option><option value="1">1年</option><option value="2" selected>2年</option><option value="3">3年</option></select></div>
        <div class="form-field"><label for="m_landlordRenewalWindowDays">地主継続確認期間</label><select id="m_landlordRenewalWindowDays"><option value="1" selected>1ヶ月</option><option value="2">2ヶ月</option><option value="3">3ヶ月</option></select></div>
        <div class="form-field"><label for="m_landlordLeadTimeDays">地主契約確認リードタイム</label><select id="m_landlordLeadTimeDays"><option value="0">0ヶ月</option><option value="1" selected>1ヶ月</option><option value="2">2ヶ月</option><option value="3">3ヶ月</option></select></div>
        <div class="form-field"><label>地主継続確認期日（自動計算）</label><div id="m_landlordRenewalDueDatePreview" class="form-readonly media-calc-readonly">—</div></div>
        <div class="form-field"><label>地主継続確認日（自動計算）</label><div id="m_landlordRenewalCheckDatePreview" class="form-readonly media-calc-readonly">—</div></div>
        <div class="form-field form-field--full"><label for="m_remarks">備考</label><textarea id="m_remarks" rows="3"></textarea></div>
        <div class="form-field form-field--full"><label for="media_changeNote">変更メモ（保存時に履歴へ追記）</label><textarea id="media_changeNote" rows="2"></textarea></div>
      </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn--primary">保存</button>
        <div class="form-actions__spacer"></div>
        <button type="button" class="btn btn--ghost" id="mediaFormDelete" hidden style="color:#b91c1c;border-color:#fecaca">削除</button>
        <a href="media-mgmt.html" class="btn btn--ghost">キャンセル</a>
      </div>
      </div>
      </div>
    </form>
  </div>
  </main>
</div>
<script src="js/data-store.js"></script>
<script src="js/nav.js"></script>
<script src="js/media-mgmt-form.js"></script>
</body>
